<script defer>
	
	/*
	Export part of a world as HTML
	12/21/2022
	Instructions:
	Press Alt+D or Ctrl+X and select part of a world. A file will be saved once you let go of your mouse.
*/

var reg = new RegionSelection();
reg.init();

reg.onselection(function(start, end, width, height) {
	var tx = start[0];
	var ty = start[1];
	var cx = start[2];
	var cy = start[3];
	var name = state.worldModel.name;
	var res = "";
	res += "<html>";
	res += "<head>";
	res += "<title>World - \"" + encodeURIComponent(name) + "\"</title>";
	res += "<style>";
	res += "";
	res += "</style>";
	res += "</head>";
	res += "<body>";
	res += "<pre style=\"font-family: 'Courier New'; font-size: 16px;\">";
	var prevColor = 0;
	for(var y = 0; y < height; y++) {
		var line = "";
		for(var x = 0; x < width; x++) {
			var ci = getCharInfo(tx, ty, cx, cy);
			
			var char = html_tag_esc(ci.char);
			char = char.replace(/\t/g, " ");
			char = char.replace(/\r/g, " ");
			char = char.replace(/\n/g, " ");
			var color = ci.color;
			
			if(prevColor == color) {
				res += char;
			} else {
				if(prevColor > 0) {
					res += "</span>";
				}
				if(color > 0) {
					res += "<span style=\"color:#" + (color.toString(16).padStart(6, 0)) + "\">";
				}
				res += char;
			}
			
			prevColor = color;
			
			cx++;
			if(cx >= 16) {
				cx = 0;
				tx++;
			}
		}
		cy++;
		if(cy >= 8) {
			ty++;
			cy = 0;
		}
		cx = start[2];
		tx = start[0];
		if(prevColor > 0) {
			res += "</span>";
		}
		prevColor = 0;
		res += "<br>";
	}
	res += "</pre>";
	res += "</body>";
	res += "</html>";
	
	var save = document.createElement("a");
	var blob = new Blob([res], {type: "text/html"});
	var url = window.URL.createObjectURL(blob);
	save.href = url;
	save.download = "export-" + Date.now() + ".html";
	save.click();
	window.URL.revokeObjectURL(blob);
});

});

menu.addOption('Image Paster', async () => {
    const fileInput = document.createElement('input');
    fileInput.type = 'file';
    fileInput.accept = 'image/*';

    fileInput.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const img = new Image();
        img.src = URL.createObjectURL(file);

        await new Promise(resolve => img.onload = resolve);

        const x = parseInt(prompt('Enter starting X coordinate:', 20));
        const y = parseInt(prompt('Enter starting Y coordinate:', 15));

        if (isNaN(x) || isNaN(y)) {
            alert('Invalid coordinates!');
            return;
        }

        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');

        const maxWidth = 300;
        const maxHeight = 300;

        let width = img.width;
        let height = img.height;

        if (width > maxWidth || height > maxHeight) {
            const ratio = Math.min(maxWidth / width, maxHeight / height);
            width = Math.floor(width * ratio);
            height = Math.floor(height * ratio);
        }

        canvas.width = width;
        canvas.height = height;
        ctx.drawImage(img, 0, 0, width, height);

        const imageData = ctx.getImageData(0, 0, width, height).data;

        const delay = 1;
        let position = 0;

        for (let py = 0; py < height; py += 2) {
            for (let px = 0; px < width; px++) {

                const i1 = (py * width + px) * 4;
                const r1 = imageData[i1];
                const g1 = imageData[i1 + 1];
                const b1 = imageData[i1 + 2];
                const a1 = imageData[i1 + 3];

                let r2 = 0, g2 = 0, b2 = 0, a2 = 0;
                if (py + 1 < height) {
                    const i2 = ((py + 1) * width + px) * 4;
                    r2 = imageData[i2];
                    g2 = imageData[i2 + 1];
                    b2 = imageData[i2 + 2];
                    a2 = imageData[i2 + 3];
                }

                if (a1 < 128 && a2 < 128) continue;

                const color1 = rgbToOwotColor(r1, g1, b1);

                setTimeout(() => {
                    writeCharToXY('█', color1, x + px, y + Math.floor(py / 2));
                }, position * delay);

                position++;
            }
        }

        alert(`Image will be pasted over ${Math.ceil((position * delay)/1000)} seconds`);
    };

    fileInput.click();

    function rgbToOwotColor(r, g, b) {
        if (typeof resolveColorValue === "function") {
            return resolveColorValue(`rgb(${r},${g},${b})`);
        }
        // fallback if OWOT function missing
        return `rgb(${r},${g},${b})`;
    }
});
